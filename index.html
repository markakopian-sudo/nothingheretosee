<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoJOOOO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <h1 class="main-title">JoJOOOO</h1>

        <div class="shortcut-grid">
            <a href="https://www.youtube.com" class="shortcut-item" target="_blank" aria-label="YouTube">
                <span class="icon-placeholder utube">YT</span>
            </a>
            <a href="https://www.twitch.tv" class="shortcut-item" target="_blank" aria-label="Twitch">
                <span class="icon-placeholder twitch">TW</span>
            </a>
            <a href="https://discord.com" class="shortcut-item" target="_blank" aria-label="Discord">
                <span class="icon-placeholder discord">DC</span>
            </a>
        </div>

        <div class="search-section">
            <form action="https://www.google.com/search" method="get" target="_blank">
                <input type="text" name="q" class="search-input" placeholder="Search the web..." required>
            </form>
        </div>

        <footer class="dashboard-footer">
            <p>Welcome to your personal dashboard configuration.</p>
        </footer>
    </div>

</body>
</html>
